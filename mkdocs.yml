site_name: Rooted
site_url: https://sitename.example
theme:
  
  name: material
  font:
    text: Quantico
    code: JetBrains Mono
  
  
  
  logo: assets/Termux_Styling.jpeg
  favicon: assets/white.ico
  features:
    - navigation.footer
    
   

           
  palette: 
    scheme: slate
    primary: black
    accent: purple

    
  


markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  
  
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.tabbed:
      alternate_style: true  
  - admonition
  - pymdownx.details


extra:
  generator: false  #removes the "made with mkdocs footer"
  social:
    - icon: simple/youtube
      link: https://www.youtube.com/watch?v=dQw4w9WgXcQ
   # - icon: simple/linkedin
   #   link: https://linkedin.com/in/willettjames
   
extra_css:
  - stylesheets/extra.css
  
  


copyright: "This site documents labs completed on legal platforms like TryHackMe and Hack The Box."

  


      
      
    
    
     

      
    


