site_name: My Docs
site_url: https://sitename.example
theme:
  
  name: material
  font:
    text: Quantico
    code: Fira Code
  
  logo: assets/Termux_Styling.jpeg
  favicon: assets/white.ico
  features:
    - navigation.footer
   

           
  palette: 
  # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: black
      accent: green

  # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep purple


markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  
  
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.tabbed:
      alternate_style: true  
  - admonition
  - pymdownx.details


extra:
  generator: false  #removes the "made with mkdocs footer"
  social:
    - icon: simple/youtube
      link: https://www.youtube.com/watch?v=dQw4w9WgXcQ
   # - icon: simple/linkedin
   #   link: https://linkedin.com/in/willettjames

copyright: Copyright &copy; 2024 Example
  


      
      
    
    
     

      
    


