site_name: Rooted
site_description: A living knowledge base documenting my journey into cybersecurity.
site_url: https://ins4ne160.github.io/mkdocs_exp/

repo_name: INS4NE160/mkdocs_exp
repo_url: https://github.com/INS4NE160/mkdocs_exp

theme:
  name: material
  language: en

  logo: assets/logo1.svg         
  favicon: assets/logo1.svg

  font:
    text: Quantico
    code: JetBrains Mono

  palette:
    scheme: slate
    primary: black
    accent: deep purple

  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      tip: octicons/squirrel-16
      warning: octicons/alert-16
      danger: octicons/zap-16
      success: octicons/check-16

  features:
    - navigation.tabs                # top-level nav as tabs
    - navigation.tabs.sticky         # tabs stay visible on scroll
    - navigation.sections            # collapsible sidebar sections
    - navigation.indexes             # section index pages (folder/index.md)
    - navigation.top                 # back to top button
    - navigation.footer              # prev/next page footer
    - search.highlight               # highlight search terms on page
    - search.suggest                 # search autocomplete
    - content.code.copy              # copy button on all code blocks
    - content.code.annotate          # annotate lines in code blocks
    - content.tabs.link              # linked content tabs


markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true          # nice checkboxes for progress tracking
  - toc:
      permalink: true                # anchor links on every heading


plugins:
  - search
  - pdf-export:
      verbose: false
      media_type: print
      enabled_if_env: ENABLE_PDF_EXPORT

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/INS4NE160
    - icon: simple/youtube
      link: https://www.youtube.com/watch?v=dQw4w9WgXcQ


extra_css:
  - stylesheets/extra.css
  - https://use.fontawesome.com/releases/v5.13.0/css/all.css


copyright: |
  Disclaimer: This site is just me documenting what I'm learning.
  Expect rough notes, mistakes, and things that may change as I understand them better.


nav:
  - Home: index.md

  - Roadmap: Roadmap/roadmap_index.md

  - Notes:
    - Notes/notes_index.md
    - TryHackMe:
      - Notes/TryHackMe/THM_index.md
      - Pre-Security:
        - Notes/TryHackMe/pre-security/presec_index.md
        
  - Walkthroughs:
    - Walkthroughs/walkthrough_index.md
    - TryHackMe:
      - walkthroughs/tryhackme/index.md
    - HackTheBox:
      - walkthroughs/hackthebox/index.md
    - CTF:
      - walkthroughs/ctf/index.md

  - Tools:
    - Tools/tools_index.md

  - Methodology: Methodology/methodology_index.md

  - Reflections: Reflections/Roadmap/reflection_index.md






