<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer rounded square background -->
  <rect x="6" y="6" width="88" height="88" rx="16" ry="16" fill="#0f0f0f" stroke="#7c3aed" stroke-width="2.5"/>

  <!-- Terminal window top bar -->
  <rect x="6" y="6" width="88" height="22" rx="16" ry="16" fill="#1a1a2e"/>
  <rect x="6" y="18" width="88" height="10" fill="#1a1a2e"/>

  <!-- Traffic light dots -->
  <circle cx="22" cy="17" r="4" fill="#ff5f56"/>
  <circle cx="35" cy="17" r="4" fill="#ffbd2e"/>
  <circle cx="48" cy="17" r="4" fill="#27c93f"/>

  <!-- Prompt arrow > -->
  <text x="16" y="58" font-family="monospace" font-size="22" font-weight="bold" fill="#a855f7">&#62;</text>

  <!-- Cursor block -->
  <rect x="38" y="42" width="12" height="20" rx="2" fill="#7c3aed" opacity="0.9"/>
</svg>
