{% extends "base.html" %}

{% block footer %}
  {{ super() }}
  
  <div class="disclaimer-footer" style="
    text-align: center;
    padding: 1rem;
    background-color: var(--md-footer-bg-color--dark);
    color: var(--md-footer-fg-color--light);
    font-size: 1rem;
    border-top: 1px solid var(--md-footer-fg-color--light);
    margin-top: 2rem;
  ">
    ⚠️ <strong>Disclaimer:</strong> {{ config.extra.disclaimer }}
  </div>
{% endblock %}


.disclaimer-footer {
  font-size: 1rem !important;
  padding: 1.5rem !important;
  line-height: 1.8 !important;
}
